services:
  - type: web
    name: plant-diagnosis-backend
    runtime: docker
    rootDir: backend
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEATHERSTACK_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"

services:
  - type: web
    name: plant-diagnosis-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEATHERSTACK_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
